---
:project:
  :use_exceptions: FALSE
  :use_test_preprocessor: TRUE
  :use_auxiliary_dependencies: TRUE
  :build_root: build
  :release_build: FALSE
  :test_file_prefix: test_
  :which_ceedling: gem
  :default_tasks:
    - test:all

:paths:
  :test:
    - field-device/**
    - gateway/**
    - example/**
  :source:
    - mocks/**
    - ../firmware/**
  :support:
    - support

:defines:
  :common: &common_defines []
  :test:
    - *common_defines
    - TEST
  :test_preprocess:
    - *common_defines
    - TEST
  :test_logger:
    - STM32F469xx
    - LOG_LEVEL_MIN=LOG_LVL_DEBUG
    - TEST
  :test_led_driver_fd:
    - STM32F469xx
    - TEST
  :test_led_driver_gw:
    - STM32L475xx
    - TEST
  :test_health_monitor:
    - STM32F469xx
    - TEST
    - UNIT_TEST
  :test_time_provider:
    - STM32F469xx
    - TEST
  :test_i2c_driver_f4:
    - STM32F469xx
    - TEST
  :test_i2c_driver_l4:
    - STM32L475xx
    - TEST
  :test_barometer_driver:
    - STM32F469xx
    - TEST
  :test_humidity_temp_driver:
    - STM32F469xx
    - TEST
  :test_sensor_service:
    - STM32F469xx
    - TEST
    - UNIT_TEST
  :test_alarm_service:
    - STM32F469xx
    - TEST
  :test_qspi_flash_driver:
    - STM32F469xx
    - BOARD_FIELD_DEVICE
    - TEST

:cmock:
  :mock_prefix: mock_
  :when_no_prototypes: :warn
  :enforce_strict_ordering: TRUE
  :plugins:
    - :ignore
    - :callback
  :treat_as:
    uint8:    HEX8
    uint16:   HEX16
    uint32:   UINT32
    int8:     INT8
    bool:     UINT8

:plugins:
  :load_paths:
    - "#{Ceedling.load_path}"
  :enabled:
    - stdout_pretty_tests_report
    - module_generator