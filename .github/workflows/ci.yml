name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  host-tests:
    name: Host unit tests (Ceedling)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.0"
          bundler-cache: false

      - name: Install Ceedling
        run: gem install ceedling -v 0.31.1

      - name: Install Ceedling
        run: gem install ceedling

      - name: Run tests
        working-directory: tests
        run: ceedling test:all

  firmware-build:
    name: Firmware build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: f469
            project_path: firmware/field-device
            project_target: field-device/Debug
          - target: l475
            project_path: firmware/gateway
            project_target: gateway/Debug
    steps:
      - uses: actions/checkout@v4

      - name: Build with STM32CubeIDE
        uses: xanderhendriks/action-build-stm32cubeide@v15.0
        with:
          project-path: ${{ matrix.project_path }}
          project-target: ${{ matrix.project_target }}

  cppcheck:
    name: Static analysis (cppcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          sources=$(find firmware \
            \( -path '*/drivers/*' -o -path '*/middleware/*' -o -path '*/application/*' \) \
            \( -name '*.c' -o -name '*.h' \) 2>/dev/null || true)
          if [ -z "$sources" ]; then
            echo "cppcheck: no project source files found — skipping"
            exit 0
          fi
          echo "$sources" | xargs cppcheck \
            --enable=all \
            --error-exitcode=1 \
            --suppressions-list=cppcheck-suppressions.xml

  clang-format-check:
    name: Formatting check (clang-format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format-17
        run: sudo apt-get install -y clang-format-17

      - name: Check formatting
        run: |
          files=$(find firmware \
            \( -path '*/drivers/*' -o -path '*/middleware/*' -o -path '*/application/*' \) \
            \( -name '*.c' -o -name '*.h' \) 2>/dev/null || true)
          if [ -z "$files" ]; then
            echo "clang-format: no project source files found — skipping"
            exit 0
          fi
          echo "$files" | xargs clang-format-17 --dry-run --Werror

  markdownlint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: |
            docs/**/*.md
            README.md
