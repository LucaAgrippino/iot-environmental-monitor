<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Field Device LCD · P + T · 13 screens × 2 aesthetics</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
html,body{margin:0;padding:0;background:#06080B;color:#E8F2FA;font-family:'Inter',system-ui,sans-serif}
@keyframes blink{50%{opacity:0}}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<template id="__bundler_thumbnail">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#0D1117"/>
  <g font-family="Inter,monospace" font-weight="700" fill="#7BAFD4" text-anchor="middle">
    <text x="70" y="105" font-size="56">P</text>
    <text x="130" y="105" font-size="56">T</text>
  </g>
  <text x="100" y="150" text-anchor="middle" fill="#A0A8B0" font-family="monospace" font-size="9" letter-spacing="2">FIELD DEVICE LCD</text>
</svg>
</template>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="p-aesthetic.jsx"></script>
<script type="text/babel" src="t-aesthetic.jsx"></script>
<script type="text/babel">
const App = () => {
  const {PSplash, PFirmware, PSensors, PStatus, PAlarms, PConfig} = window.PScreens;
  const {TSplash, TFirmware, TSensors, TStatus, TAlarms, TConfig} = window.TScreens;
  const W=800, H=480;
  return (
    <DesignCanvas>
      <DCSection id="p" title="P · Operator grade" subtitle="Schneider/Siemens influence — calm tonal cards, left-stripe status, inline 5-min sparklines, 64 px tab bar with icon-above-label">
        <DCArtboard id="p-splash" label="01 · Boot splash" width={W} height={H}><PSplash/></DCArtboard>
        <DCArtboard id="p-fw" label="02 · Firmware update" width={W} height={H}><PFirmware/></DCArtboard>
        <DCArtboard id="p-sn" label="03 · Sensors · Normal (REQ-LD-010..030)" width={W} height={H}><PSensors variant="normal"/></DCArtboard>
        <DCArtboard id="p-sw" label="04 · Sensors · Waiting (REQ-LD-040)" width={W} height={H}><PSensors variant="waiting"/></DCArtboard>
        <DCArtboard id="p-ss" label="05 · Sensors · Stale (REQ-LD-050)" width={W} height={H}><PSensors variant="stale"/></DCArtboard>
        <DCArtboard id="p-se" label="06 · Sensors · Error (REQ-LD-060)" width={W} height={H}><PSensors variant="error"/></DCArtboard>
        <DCArtboard id="p-st" label="07 · Status · Healthy (REQ-LD-070)" width={W} height={H}><PStatus/></DCArtboard>
        <DCArtboard id="p-sa" label="08 · Status · Degraded" width={W} height={H}><PStatus alert/></DCArtboard>
        <DCArtboard id="p-ae" label="09 · Alarms · Empty (REQ-LD-090)" width={W} height={H}><PAlarms empty/></DCArtboard>
        <DCArtboard id="p-aa" label="10 · Alarms · Active (REQ-LD-080)" width={W} height={H}><PAlarms/></DCArtboard>
        <DCArtboard id="p-ci" label="11 · Config · Idle (REQ-LD-100..130)" width={W} height={H}><PConfig variant="idle"/></DCArtboard>
        <DCArtboard id="p-cv" label="12 · Config · Validation error (REQ-LD-140)" width={W} height={H}><PConfig variant="invalid"/></DCArtboard>
        <DCArtboard id="p-cm" label="13 · Config · Confirm modal (REQ-LD-150)" width={W} height={H}><PConfig variant="modal"/></DCArtboard>
      </DCSection>
      <DCSection id="t" title="T · Tile grid" subtitle="Grafana/Datadog influence — modular tiles with sparklines and deltas, segmented tab control, easy to extend to N sensors">
        <DCArtboard id="t-splash" label="01 · Boot splash" width={W} height={H}><TSplash/></DCArtboard>
        <DCArtboard id="t-fw" label="02 · Firmware update" width={W} height={H}><TFirmware/></DCArtboard>
        <DCArtboard id="t-sn" label="03 · Sensors · Normal" width={W} height={H}><TSensors variant="normal"/></DCArtboard>
        <DCArtboard id="t-sw" label="04 · Sensors · Waiting" width={W} height={H}><TSensors variant="waiting"/></DCArtboard>
        <DCArtboard id="t-ss" label="05 · Sensors · Stale" width={W} height={H}><TSensors variant="stale"/></DCArtboard>
        <DCArtboard id="t-se" label="06 · Sensors · Error" width={W} height={H}><TSensors variant="error"/></DCArtboard>
        <DCArtboard id="t-st" label="07 · Status · Healthy" width={W} height={H}><TStatus/></DCArtboard>
        <DCArtboard id="t-sa" label="08 · Status · Degraded" width={W} height={H}><TStatus alert/></DCArtboard>
        <DCArtboard id="t-ae" label="09 · Alarms · Empty" width={W} height={H}><TAlarms empty/></DCArtboard>
        <DCArtboard id="t-aa" label="10 · Alarms · Active" width={W} height={H}><TAlarms/></DCArtboard>
        <DCArtboard id="t-ci" label="11 · Config · Idle" width={W} height={H}><TConfig variant="idle"/></DCArtboard>
        <DCArtboard id="t-cv" label="12 · Config · Validation error" width={W} height={H}><TConfig variant="invalid"/></DCArtboard>
        <DCArtboard id="t-cm" label="13 · Config · Confirm modal" width={W} height={H}><TConfig variant="modal"/></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
};
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
